# =============================================================================
# OUTPUT FIELD DEFINITIONS
# =============================================================================

output_fields:
  required:
    # Tribe identification (bilingual)
    - name: tribe_arabic
      type: string
      description: "Tribe name in Arabic script"
      example: "بنو حنيفة"
    - name: tribe_english
      type: string
      description: "Tribe name in Brill EI3 transliteration"
      example: "Banū Ḥanīfa"
    
    # Region (bilingual)
    - name: region_arabic
      type: string
      description: "Region in Arabic"
      example: "اليمامة"
    - name: region_english
      type: string
      description: "Region in English"
      example: "al-Yamāma"
    
    # Year (both calendars)
    - name: year_ah
      type: integer
      description: "Hijri year (11 or 12)"
      example: 12
    - name: year_ce
      type: integer
      description: "Common Era year (632 or 633)"
      example: 633
    
    # Incorporation mode (bilingual)
    - name: incorporation_mode_arabic
      type: string
      enum: ["إخضاع", "طاعة", "مختلط", "غير معروف"]
      description: "Classification in Arabic"
    - name: incorporation_mode_english
      type: string
      enum: ["SUBJUGATION", "SUBMISSION", "MIXED", "UNKNOWN"]
      description: "Classification in English"
    
    # Commander (bilingual)
    - name: commander_arabic
      type: string
      description: "Muslim commander in Arabic"
      example: "خالد بن الوليد"
    - name: commander_english
      type: string
      description: "Muslim commander transliterated"
      example: "Khālid ibn al-Walīd"
    
    # Rebel leader (bilingual)
    - name: rebel_leader_arabic
      type: string
      description: "Rebel/false prophet in Arabic"
      example: "مسيلمة الكذاب"
    - name: rebel_leader_english
      type: string
      description: "Rebel/false prophet transliterated"
      example: "Musaylima al-Kadhdhāb"
    
    # Battle site (bilingual)
    - name: battle_site_arabic
      type: string
      description: "Battle location in Arabic"
      example: "عقرباء"
    - name: battle_site_english
      type: string
      description: "Battle location transliterated"
      example: "ʿAqrabāʾ"
    
    # Outcome (bilingual)
    - name: outcome_arabic
      type: string
      description: "Event outcome in Arabic"
    - name: outcome_english
      type: string
      description: "Event outcome in English"
    
    # Evidence (bilingual)
    - name: evidence_arabic
      type: array
      description: "Arabic quotes from source"
    - name: evidence_english
      type: array
      description: "English translations of evidence"
    
    # Notes (bilingual)
    - name: notes_arabic
      type: string
      description: "Additional notes in Arabic"
    - name: notes_english
      type: string
      description: "Additional notes in English"
    
    # Confidence
    - name: confidence
      type: float
      description: "Confidence score 0.0-1.0"

  # Geocoding fields (added by pipeline)
  geocoding:
    - name: _lat
      type: float
      description: "Latitude from al-Turayyā"
    - name: _lon
      type: float
      description: "Longitude from al-Turayyā"
    - name: _source
      type: string
      description: "Source identifier (tabari/baladhuri)"