        tribe_arabic: "بنو حنيفة"
        tribe_english: "Banū Ḥanīfa"
        region_arabic: "اليمامة"
        region_english: "al-Yamāma"
        year_ah: 12
        year_ce: 633
        incorporation_mode_arabic: "إخضاع"
        incorporation_mode_english: "SUBJUGATION"
        commander_arabic: "خالد بن الوليد"
        commander_english: "Khālid ibn al-Walīd"
        rebel_leader_arabic: "مسيلمة الكذاب"
        rebel_leader_english: "Musaylima al-Kadhdhāb"
        battle_site_arabic: "عقرباء"
        battle_site_english: "ʿAqrabāʾ"
