# ==============================================================================
# OUTPUT SETTINGS
# ==============================================================================

output:
  # Default output directory
  directory: "./output/llm_results"
  
  json_indent: 2
  include_source_text: true
  include_validation: true
  
  # CSV fields (all bilingual)
  csv_fields:
    # Tribe (bilingual)
    - "tribe_arabic"
    - "tribe_english"
    # Region (bilingual)
    - "region_arabic"
    - "region_english"
    # Year (both calendars)
    - "year_ah"
    - "year_ce"
    # Incorporation mode (bilingual)
    - "incorporation_mode_arabic"
    - "incorporation_mode_english"
    # Commander (bilingual)
    - "commander_arabic"
    - "commander_english"
    # Rebel leader (bilingual)
    - "rebel_leader_arabic"
    - "rebel_leader_english"
    # Battle site (bilingual)
    - "battle_site_arabic"
    - "battle_site_english"
    # Outcome (bilingual)
    - "outcome_arabic"
    - "outcome_english"
    # Evidence (bilingual)
    - "evidence_arabic"
    - "evidence_english"
    # Notes (bilingual)
    - "notes_arabic"
    - "notes_english"
    # Confidence and geocoding
    - "confidence"
    - "_lat"
    - "_lon"
    - "_source"

# ==============================================================================
# LOGGING
# ==============================================================================

logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file: "ridda_pipeline.log"