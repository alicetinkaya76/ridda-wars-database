# ==============================================================================
# RIDDA WARS DATABASE PIPELINE v1.0 - CONFIGURATION
# ==============================================================================
# Computational Analysis of Tribal Unification in Early Islam (11-12 AH)
# 
# Based on the paper: "The Ridda Wars Database: A Computational Analysis 
# of Tribal Unification in Early Islam using Large Language Models"

# API Configuration
api:
  anthropic:
    # Set your API key here or use ANTHROPIC_API_KEY environment variable
    api_key: ""
    model: "claude-sonnet-4-20250514"

# ==============================================================================
# OPENITI SOURCE FILES
# ==============================================================================
# These files contain the relevant Ridda Wars sections extracted from OpenITI

sources:
  tabari:
    name: "al-Ṭabarī"
    name_ar: "الطبري"
    full_title: "Tārīkh al-Rusul wa-l-Mulūk"
    full_title_ar: "تاريخ الرسل والملوك"
    death_year: 310
    structure: "annalistic"
    # Use the extracted Ridda section (much smaller, ~17 chunks vs ~446)
    openiti_file: "tabari_ridda_section.txt"
    # Original full file (if you want to process everything):
    # openiti_file: "0310Tabari.Tarikh.Masaha001963Vols-ara1"
    openiti_id: "0310Tabari"
    corpus: "Masaha"
    notes: "Extracted Ridda Wars section (Year 11-12 AH) from full Tabari"
    ridda_relevant_sections:
      - "ذكر الردة"
      - "أخبار الردة"
      - "سنة إحدى عشرة"
      - "سنة اثنتي عشرة"
      - "خلافة أبي بكر"

  baladhuri:
    name: "al-Balādhurī"
    name_ar: "البلاذري"
    full_title: "Futūḥ al-Buldān"
    full_title_ar: "فتوح البلدان"
    death_year: 279
    structure: "geographic"
    # Use the extracted Ridda section (much smaller, ~3 chunks vs ~66)
    openiti_file: "baladhuri_ridda_section.txt"
    # Original full file (if you want to process everything):
    # openiti_file: "0279Baladhuri.FutuhBuldan.Masaha002329Vols-ara1"
    openiti_id: "0279Baladhuri"
    corpus: "Masaha"
    notes: "Extracted Ridda Wars section from Futūḥ al-Buldān"
    ridda_relevant_sections:
      - "فتح عمان"
      - "غزوة البحرين"
      - "دعوة النبي أهل اليمامة"
      - "خبر ردة العرب"
      - "ردة بني وليعة"
      - "أمر الأسود العنسي"

  waqidi:
    name: "al-Wāqidī"
    name_ar: "الواقدي"
    full_title: "Kitāb al-Ridda"
    full_title_ar: "كتاب الردة"
    death_year: 207
    structure: "narrative"
    # Extracted Ridda section (excluding Futūḥ al-ʿIrāq appendix)
    openiti_file: "waqidi_ridda_section.txt"
    # Original full file:
    # openiti_file: "0207Waqidi_Ridda_Shamela0012222-ara1.mARkdown"
    openiti_id: "0207Waqidi"
    corpus: "Shamela"
    notes: >
      Dedicated Ridda monograph, earliest of the three sources (d. 207).
      Transmitted via Ibn al-Aʿtham al-Kūfī redaction.
      Editor: Yaḥyā al-Jabbūrī (Dār al-Gharb al-Islāmī, Beirut, 1990).
      Does NOT cover al-Aswad al-ʿAnsī in Yemen (begins with post-succession events).
      Strong on Najd (Ṭulayḥa, Fujāʾa), Yamāma (Musaylima), Bahrain, and Ḥaḍramawt (Kinda).
    ridda_relevant_sections:
      - "اضطراب امر الناس عند وفاة النبي"
      - "أخبار سقيفة بني ساعدة"
      - "ذكر أخبار الردة"
      - "ذكر خروج أسامة بن زيد"
      - "ذكر فجاءة بن عبد ياليل"
      - "خبر مالك بن نويرة ومسيلمة الكذاب"
      - "ذكر ردة أهل البحرين"
      - "ذكر ارتداد أهل حضرموت من كندة وغيرها"

# ==============================================================================
# EXTRACTION SETTINGS (Ridda Wars specific)
# ==============================================================================

extraction:
  min_year: 11        # Start of Ridda Wars (death of Prophet)
  max_year: 12        # End of Ridda Wars (completion of campaigns)
  chunk_size: 20000   # Characters per API call
  overlap: 2000       # Overlap between chunks for context continuity
  delay: 1.5          # Seconds between API calls (rate limiting)
  max_retries: 3      # Retry failed API calls

# ==============================================================================
# TERMINOLOGY (Brill EI3 Standard)
# ==============================================================================
# SUBJUGATION (qitāl) - Military campaign against rebellious tribe
#   Arabic indicators: قتال، حرب، غزو، سيف، قتل، هزم، ظفر، غنم، سبي
#   Characteristics: Armed conflict, casualties, prisoners
#
# SUBMISSION (ṭāʿa) - Voluntary return to Islamic authority  
#   Arabic indicators: طاعة، أطاع، رجع، تاب، أسلم، بايع، صالح، أمان
#   Characteristics: Peaceful return, oath of allegiance, zakāt payment
#
# MIXED - Combined elements of both military and diplomatic resolution

terminology:
  subjugation:
    brill_term: "SUBJUGATION"
    arabic_term: "qitāl"
    arabic_script: "قتال"
    indicators:
      - "قتال"
      - "قاتل"
      - "قاتلهم"
      - "حرب"
      - "حارب"
      - "غزو"
      - "غزا"
      - "سيف"
      - "بالسيف"
      - "قتل"
      - "قتلوا"
      - "هزم"
      - "هزمهم"
      - "ظفر"
      - "غنم"
      - "سبي"
      - "سبايا"
      - "فتح"
      - "حصار"

  submission:
    brill_term: "SUBMISSION"
    arabic_term: "ṭāʿa"
    arabic_script: "طاعة"
    indicators:
      - "طاعة"
      - "أطاع"
      - "أطاعوا"
      - "رجع"
      - "رجعوا"
      - "تاب"
      - "تابوا"
      - "أسلم"
      - "أسلموا"
      - "بايع"
      - "بايعوا"
      - "صالح"
      - "صلح"
      - "أمان"
      - "سلم"
      - "سلموا"
      - "أدى الزكاة"

  ridda_specific:
    description: "Terms specific to apostasy/rebellion"
    indicators:
      - "ردة"
      - "ارتد"
      - "ارتدوا"
      - "مرتد"
      - "كفر"
      - "كفروا"
      - "منع الزكاة"
      - "منعوا الزكاة"
      - "تنبأ"
      - "متنبئ"
      - "ادعى النبوة"
      - "الكذاب"

