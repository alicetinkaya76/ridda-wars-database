# ==============================================================================
# RIDDA WARS DATABASE - SEMANTIC ANCHORS
# ==============================================================================
# Arabic sentence patterns for semantic similarity matching.
# Used to detect Ridda Wars events and classify incorporation modes.
#
# TERMINOLOGY (Brill EI3):
#   SUBJUGATION (qitāl) - Military campaign against rebellious tribe
#   SUBMISSION (ṭāʿa) - Voluntary return to Islamic authority
#   MIXED - Combined elements

# =============================================================================
# SUBJUGATION (qitāl) Anchors
# =============================================================================
# High similarity suggests military campaign/armed conflict

subjugation:
  # Military campaign
  - سار إليهم بالجيش
  - غزا القبيلة
  - خرج إليهم بالجنود
  - بعث إليهم جيشا
  - أرسل إليهم سرية
  
  # Combat and fighting
  - قاتلهم قتالا شديدا
  - فقاتلهم حتى هزمهم
  - التقى الجمعان
  - وقعت بينهم وقعة عظيمة
  - اقتتلوا اقتتالا شديدا
  - حاربهم حتى غلبهم
  
  # Victory and defeat
  - هزم المرتدين
  - ظفر بهم
  - غلب عليهم
  - انتصر عليهم
  - كسرهم
  - هزمهم شر هزيمة
  
  # Killing and casualties
  - قتل منهم خلقا كثيرا
  - قتل المقاتلة
  - وضع فيهم السيف
  - أثخن فيهم القتل
  - فقتلوا من قتلوا
  
  # Spoils and captives
  - سبى الذرية
  - غنم أموالهم
  - أخذ أموالهم وسباياهم
  - سبايا كثيرة
  - غنائم عظيمة
  
  # Siege
  - حاصرهم
  - ضرب عليهم الحصار
  - أحاط بهم
  
  # Specific Ridda battles
  - وقعة بزاخة
  - وقعة عقرباء
  - يوم اليمامة
  - معركة دبا

# =============================================================================
# SUBMISSION (ṭāʿa) Anchors
# =============================================================================
# High similarity suggests voluntary return to Islamic authority

submission:
  # Return to Islam
  - رجعوا إلى الإسلام
  - عادوا إلى الطاعة
  - دخلوا في الطاعة
  - تابوا ورجعوا
  - أسلموا وتابوا
  
  # Allegiance
  - بايعوا أبا بكر
  - بايعوا الخليفة
  - أعطوا البيعة
  - جددوا البيعة
  
  # Zakāt payment
  - أدوا الزكاة
  - أعطوا الزكاة
  - أدوا الصدقة
  - بذلوا الزكاة
  - قبلوا أداء الزكاة
  
  # Peaceful submission
  - سلموا أنفسهم
  - استسلموا بغير قتال
  - لم يقاتلوا
  - سلموا دون قتال
  
  # Treaty/Peace
  - صالحهم
  - عقد معهم صلحا
  - أمنهم
  - أعطاهم الأمان
  
  # Obedience language
  - أطاعوا
  - أذعنوا
  - خضعوا
  - انقادوا

# =============================================================================
# RIDDA-SPECIFIC Anchors
# =============================================================================
# Indicators that text is about Ridda Wars

ridda_markers:
  # Apostasy terms
  - ارتد عن الإسلام
  - ارتدوا بعد وفاة النبي
  - أهل الردة
  - المرتدون
  - المرتدين
  
  # Zakāt refusal
  - منعوا الزكاة
  - أبوا أن يؤدوا الزكاة
  - فرقوا بين الصلاة والزكاة
  - امتنعوا من أداء الزكاة
  
  # False prophethood
  - ادعى النبوة
  - تنبأ
  - المتنبئ
  - المتنبئون
  - كذاب اليمامة
  - الكذاب
  
  # Specific references
  - حروب الردة
  - قتال أهل الردة
  - أيام الردة
  - سنة الردة
  
  # Caliph Abū Bakr
  - خلافة أبي بكر
  - الصديق رضي الله عنه
  - بعث أبو بكر
  - أمر أبو بكر

